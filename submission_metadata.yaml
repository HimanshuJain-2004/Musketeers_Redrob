ai_usage_summary: |
 We used Gemini extensively during our initial phase for zero-shot, recruiter-style labeling on a 1,500 candidate training sample to generate ground-truth scores. We also utilized Gemini and coding assistants for pipeline architecture design, Pandas dataframe manipulation, and generating Python scripts for our ExtraTreesRegressor benchmarking and final string reasoning generation.
methodology_summary: |
  We built a hybrid machine-learning pipeline optimizing for real-world recruiter logic while strictly adhering to the 5-minute offline CPU constraint. First, we sampled 1,500 diverse candidates and used LLMs offline to evaluate their fit against the JD, generating composite recruiter scores and identifying honeypots. We then trained an ExtraTreesRegressor on these LLM-generated labels using precomputed embeddings, semantic scores, and behavioral features. For the final top 100 ranking, the ExtraTrees model scored the candidates entirely offline. Finally, a custom streaming JSONL parser dynamically extracted raw, unscaled candidate data (e.g., actual skills, years of experience) to generate human-readable, fact-based reasoning strings for our final submission.

