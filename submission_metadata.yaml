ai_usage_summary: |
  We used Gemini for extensive architectural code review, analyzing hackathon specifications, debugging pipeline issues, and formulating the submission metadata. AI was strictly used as a development assistant; no candidate data was fed into any hosted LLM APIs during the actual inference and ranking steps, which run entirely locally on CPU.

methodology_summary: |
  Our pipeline is a multi-phase, locally executable machine learning system. Phase 1 extracts candidate features, calculating semantic similarities against the JD and deriving behavioral signals. Phase 2 utilizes an ensemble of ExtraTrees, LGBM, and XGBoost regressor models to predict technical fit scores, alongside a dedicated classifier to explicitly identify and filter out honeypot profiles. Phase 3 executes the final ranking, applying a hard threshold against honeypot probabilities (<0.5) and extracting the top 100. Deterministic reasoning strings are automatically generated based on the top candidate skills and engagement signals without relying on external LLMs.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
